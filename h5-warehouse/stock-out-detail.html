<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>出库详情</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/stock-detail.css">
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="stock-out-list.html" class="back-btn">‹</a>
      <h1>出库详情</h1>
    </div>
    
    <!-- 状态卡片 -->
    <div class="status-card">
      <div class="status-icon">✓</div>
      <div class="status-text">已完成</div>
      <div class="status-time">出库时间：2024-01-15 10:30:25</div>
    </div>
    
    <!-- 基本信息 -->
    <div class="detail-section">
      <div class="section-header">
        <span class="section-icon">📋</span>
        <span class="section-title">基本信息</span>
      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">出库单号</span>
          <span class="detail-value">CK202401150001</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">关联养殖户</span>
          <span class="detail-value">千岛湖养殖户张三</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">基地名称</span>
          <span class="detail-value">千岛湖基地A区</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">出库类型</span>
          <span class="detail-value">
            <span class="type-tag tag-breeding">养殖领用</span>
          </span>
        </div>
        <div class="detail-item">
          <span class="detail-label">关联表单</span>
          <span class="detail-value">-</span>
        </div>
      </div>
    </div>
    
    <!-- 出库主体 -->
    <div class="detail-section">
      <div class="section-header">
        <span class="section-icon">🐟</span>
        <span class="section-title">出库主体</span>
      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">出库主体</span>
          <span class="detail-value">草鱼</span>
        </div>
      </div>
    </div>
    
    <!-- 出库信息 -->
    <div class="detail-section">
      <div class="section-header">
        <span class="section-icon">📦</span>
        <span class="section-title">出库信息</span>
      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">出库时间</span>
          <span class="detail-value">2024-01-15 10:30</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">出库数量</span>
          <span class="detail-value highlight">150 尾</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">操作人</span>
          <span class="detail-value">张三</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">备注说明</span>
          <span class="detail-value">日常投喂使用</span>
        </div>
      </div>
    </div>
    
    <!-- 图片凭证 -->
    <div class="detail-section">
      <div class="section-header">
        <span class="section-icon">📷</span>
        <span class="section-title">在线图片</span>
      </div>
      <div class="image-section">
        <div class="image-grid">
          <div class="image-item">
            <img src="https://picsum.photos/200/200?random=3" alt="出库图片1">
          </div>
          <div class="image-item">
            <div class="image-placeholder">+</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 底部导航 -->
  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <div class="tab-icon">📦</div>
      <div class="tab-text">仓储</div>
    </a>
    <a href="../breeding/index.html" class="tab-item">
      <div class="tab-icon">🐟</div>
      <div class="tab-text">养殖</div>
    </a>
    <a href="profile.html" class="tab-item">
      <div class="tab-icon">👤</div>
      <div class="tab-text">我的</div>
    </a>
  </div>
</body>
</html>
