<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>养殖过程</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .container {
      min-height: 100vh;
      background: #f5f5f5;
      padding-bottom: 140px;
    }

    /* 页面标题 */
    .page-header {
      background: #fff;
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
    }

    .back-btn {
      font-size: 24px;
      color: #666;
      text-decoration: none;
      margin-right: 12px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    /* 搜索栏 */
    .search-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
    }

    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 20px;
      padding: 10px 16px;
      margin-right: 12px;
    }

    .search-icon {
      font-size: 16px;
      margin-right: 8px;
      color: #999;
    }

    .search-input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #333;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: #f5f5f5;
      border-radius: 20px;
      font-size: 14px;
      color: #666;
      border: none;
    }

    .filter-arrow {
      font-size: 12px;
      margin-left: 6px;
      color: #999;
    }

    /* 记录列表 */
    .record-list {
      padding: 12px;
    }

    .record-item {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
    }

    .record-item:active {
      opacity: 0.8;
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid #f0f0f0;
    }

    .pond-info {
      display: flex;
      align-items: center;
    }

    .pond-name {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-right: 10px;
    }

    .species-tag {
      font-size: 13px;
      color: #1890ff;
      background: #e6f7ff;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .status-badge {
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
    }

    .status-good {
      background: #f6ffed;
      color: #52c41a;
    }

    .status-warning {
      background: #fff7e6;
      color: #fa8c16;
    }

    /* 记录主体 */
    .record-body {
      margin-bottom: 14px;
    }

    .info-row {
      display: flex;
      margin-bottom: 12px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-item {
      flex: 1;
    }

    .info-label {
      display: block;
      font-size: 13px;
      color: #999;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 16px;
      color: #333;
    }

    .info-value.highlight {
      color: #1890ff;
      font-weight: 600;
    }

    /* 记录底部 */
    .record-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid #f5f5f5;
    }

    .update-time {
      font-size: 13px;
      color: #999;
    }

    .action-btns {
      display: flex;
    }

    .action-btn {
      font-size: 13px;
      padding: 6px 14px;
      margin-left: 10px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }

    .action-btn.edit {
      color: #1890ff;
      background: #e6f7ff;
    }

    .action-btn.delete {
      color: #ff4d4f;
      background: #fff2f0;
    }

    /* 空状态 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 30px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-text {
      font-size: 17px;
      color: #666;
      margin-bottom: 8px;
    }

    .empty-subtext {
      font-size: 14px;
      color: #999;
    }

    /* 悬浮新增按钮 */
    .fab-btn {
      position: fixed;
      right: 24px;
      bottom: 100px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #1890ff 0%, #36cfc9 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(24,144,255,0.4);
      cursor: pointer;
      border: none;
    }

    .fab-btn:active {
      opacity: 0.8;
    }

    .fab-icon {
      font-size: 28px;
      color: #fff;
      font-weight: 300;
    }

    /* 底部导航 */
    .tab-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      background: #fff;
      border-top: 1px solid #f0f0f0;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      text-decoration: none;
      color: #999;
    }

    .tab-item.active {
      color: #1890ff;
    }

    .tab-icon {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .tab-text {
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="index.html" class="back-btn">‹</a>
      <div class="page-title">养殖过程</div>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索池塘或品种">
      </div>
      <select class="filter-btn" id="pondFilter">
        <option value="">全部池塘</option>
        <option value="1号池">1号池</option>
        <option value="2号池">2号池</option>
        <option value="3号池">3号池</option>
        <option value="4号池">4号池</option>
        <option value="5号池">5号池</option>
      </select>
    </div>

    <!-- 养殖记录列表 -->
    <div class="record-list" id="recordList">
      <!-- 动态生成 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">🐟</div>
      <div class="empty-text">暂无养殖记录</div>
      <div class="empty-subtext">点击右下角按钮添加新记录</div>
    </div>

    <!-- 新增按钮 -->
    <button class="fab-btn" onclick="addRecord()">
      <span class="fab-icon">+</span>
    </button>
  </div>

  <!-- 底部导航 -->
  <div class="tab-bar">
    <a href="../index.html" class="tab-item">
      <div class="tab-icon">📦</div>
      <div class="tab-text">仓储</div>
    </a>
    <a href="index.html" class="tab-item active">
      <div class="tab-icon">🐟</div>
      <div class="tab-text">养殖</div>
    </a>
    <a href="../profile.html" class="tab-item">
      <div class="tab-icon">👤</div>
      <div class="tab-text">我的</div>
    </a>
  </div>

  <script>
    // 模拟数据
    let allList = [
      {
        id: 1,
        pond: '1号池',
        species: '鳙鱼',
        startDate: '2024-01-15',
        days: 45,
        stage: '成长期',
        healthStatus: '良好',
        operator: '张三',
        updateTime: '2024-03-01 10:30'
      },
      {
        id: 2,
        pond: '2号池',
        species: '鲢鱼',
        startDate: '2024-01-20',
        days: 40,
        stage: '成长期',
        healthStatus: '良好',
        operator: '李四',
        updateTime: '2024-03-01 09:15'
      },
      {
        id: 3,
        pond: '3号池',
        species: '草鱼',
        startDate: '2024-02-05',
        days: 25,
        stage: '幼鱼期',
        healthStatus: '一般',
        operator: '王五',
        updateTime: '2024-03-01 08:45'
      },
      {
        id: 4,
        pond: '4号池',
        species: '鲫鱼',
        startDate: '2024-02-10',
        days: 20,
        stage: '幼鱼期',
        healthStatus: '良好',
        operator: '张三',
        updateTime: '2024-02-28 16:20'
      }
    ];

    // 渲染列表
    function renderList(list) {
      const container = document.getElementById('recordList');
      const emptyState = document.getElementById('emptyState');

      if (list.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'flex';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = list.map(item => `
        <div class="record-item" onclick="viewDetail(${item.id})">
          <div class="record-header">
            <div class="pond-info">
              <span class="pond-name">${item.pond}</span>
              <span class="species-tag">${item.species}</span>
            </div>
            <span class="status-badge ${item.healthStatus === '良好' ? 'status-good' : 'status-warning'}">
              ${item.healthStatus}
            </span>
          </div>
          <div class="record-body">
            <div class="info-row">
              <div class="info-item">
                <span class="info-label">投苗日期</span>
                <span class="info-value">${item.startDate}</span>
              </div>
              <div class="info-item">
                <span class="info-label">养殖天数</span>
                <span class="info-value highlight">${item.days}天</span>
              </div>
            </div>
            <div class="info-row">
              <div class="info-item">
                <span class="info-label">生长阶段</span>
                <span class="info-value">${item.stage}</span>
              </div>
              <div class="info-item">
                <span class="info-label">负责人</span>
                <span class="info-value">${item.operator}</span>
              </div>
            </div>
          </div>
          <div class="record-footer">
            <span class="update-time">更新于 ${item.updateTime}</span>
            <div class="action-btns">
              <button class="action-btn edit" onclick="event.stopPropagation(); editRecord(${item.id})">编辑</button>
              <button class="action-btn delete" onclick="event.stopPropagation(); deleteRecord(${item.id})">删除</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 筛选数据
    function filterData() {
      const searchQuery = document.getElementById('searchInput').value.toLowerCase();
      const selectedPond = document.getElementById('pondFilter').value;

      let filtered = allList.filter(item => {
        const matchesSearch = !searchQuery ||
          item.pond.toLowerCase().includes(searchQuery) ||
          item.species.toLowerCase().includes(searchQuery);
        const matchesPond = !selectedPond || item.pond === selectedPond;
        return matchesSearch && matchesPond;
      });

      renderList(filtered);
    }

    // 搜索事件
    document.getElementById('searchInput').addEventListener('input', filterData);
    document.getElementById('pondFilter').addEventListener('change', filterData);

    // 查看详情
    function viewDetail(id) {
      window.location.href = `breeding-detail.html?id=${id}`;
    }

    // 新增记录
    function addRecord() {
      window.location.href = 'breeding-detail.html?mode=add';
    }

    // 编辑记录
    function editRecord(id) {
      window.location.href = `breeding-detail.html?id=${id}&mode=edit`;
    }

    // 删除记录
    function deleteRecord(id) {
      if (confirm('确定要删除这条养殖记录吗？')) {
        allList = allList.filter(item => item.id !== id);
        filterData();
        alert('删除成功');
      }
    }

    // 初始化
    renderList(allList);
  </script>
</body>
</html>
