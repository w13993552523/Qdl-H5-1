<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>移池管理</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/stock-out-list.css">
  <style>
    .page-header {
      background: #faad14;
    }
    .record-type {
      color: #faad14;
    }
    .transfer-direction {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      padding: 8px;
      background: #fff7e6;
      border-radius: 4px;
      font-size: 13px;
    }
    .direction-arrow {
      color: #faad14;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="index.html" class="back-btn">‹</a>
      <h1>移池管理</h1>
    </div>
    
    <!-- 移池记录列表 -->
    <div class="record-list">
      <a href="transfer-detail.html?id=1" class="record-item">
        <div class="record-header">
          <span class="record-type">TR202604150001</span>
          <span class="record-status status-success">已完成</span>
        </div>
        <div class="record-body">
          <div class="record-info">
            <span class="record-label">鱼种：</span>
            <span class="record-value">加州鲈</span>
          </div>
          <div class="record-info">
            <span class="record-label">移池数量：</span>
            <span class="record-value">5,000尾</span>
          </div>
        </div>
        <div class="transfer-direction">
          <span>1号池,2号池</span>
          <span class="direction-arrow">→</span>
          <span>3号池</span>
        </div>
        <div class="record-footer">
          <span>2026-04-15 10:30</span>
          <span>操作人：张三</span>
        </div>
      </a>
      
      <a href="transfer-detail.html?id=2&status=pending" class="record-item">
        <div class="record-header">
          <span class="record-type">TR202604140002</span>
          <span class="record-status status-pending">新建</span>
        </div>
        <div class="record-body">
          <div class="record-info">
            <span class="record-label">鱼种：</span>
            <span class="record-value">鳙鱼</span>
          </div>
          <div class="record-info">
            <span class="record-label">移池数量：</span>
            <span class="record-value">3,000尾</span>
          </div>
        </div>
        <div class="transfer-direction">
          <span>3号池</span>
          <span class="direction-arrow">→</span>
          <span>5号池</span>
        </div>
        <div class="record-footer">
          <span>2026-04-14 14:20</span>
          <span>操作人：李四</span>
        </div>
      </a>
    </div>
  </div>
  
  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <a href="transfer-add.html" class="btn btn-primary btn-block">新增移池</a>
  </div>

  <!-- 底部导航 -->
  <div class="tab-bar" style="position: fixed; left: 0; right: 0; bottom: 0; display: flex; background: #fff; border-top: 1px solid #f0f0f0; padding-bottom: env(safe-area-inset-bottom); z-index: 100;">
    <a href="../index.html" class="tab-item" style="flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; text-decoration: none; color: #999;">
      <div style="font-size: 22px; margin-bottom: 4px;">📦</div>
      <div style="font-size: 11px;">仓储</div>
    </a>
    <a href="index.html" class="tab-item" style="flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; text-decoration: none; color: #1890ff;">
      <div style="font-size: 22px; margin-bottom: 4px;">🐟</div>
      <div style="font-size: 11px;">养殖</div>
    </a>
    <a href="../profile.html" class="tab-item" style="flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; text-decoration: none; color: #999;">
      <div style="font-size: 22px; margin-bottom: 4px;">👤</div>
      <div style="font-size: 11px;">我的</div>
    </a>
  </div>

  <style>
    .container { padding-bottom: 120px; }
  </style>
</body>
</html>
