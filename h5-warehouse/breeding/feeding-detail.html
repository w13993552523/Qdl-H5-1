<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>投喂详情</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .page-header {
      background: #52c41a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: -16px -16px 16px -16px;
      padding: 16px;
    }
    .back-btn {
      position: absolute;
      left: 16px;
      color: #fff;
      font-size: 28px;
      text-decoration: none;
    }
    .page-header h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }
    .detail-section {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-title {
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }
    .detail-item {
      display: flex;
      padding: 14px 16px;
      border-bottom: 1px solid #f5f5f5;
    }
    .detail-item:last-child {
      border-bottom: none;
    }
    .detail-label {
      width: 100px;
      color: #666;
      font-size: 14px;
    }
    .detail-value {
      flex: 1;
      color: #333;
      font-size: 14px;
      text-align: right;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .status-success {
      background: #f6ffed;
      color: #52c41a;
    }
    .status-pending {
      background: #fff7e6;
      color: #fa8c16;
    }
    /* 状态卡片 - 已完成 */
    .status-card {
      background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
      border-radius: 12px;
      padding: 24px;
      margin: 0 16px 16px;
      text-align: center;
      color: #fff;
    }
    .status-card.pending {
      background: linear-gradient(135deg, #faad14 0%, #d48806 100%);
    }
    .status-icon {
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 12px;
    }
    .status-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .status-time {
      font-size: 13px;
      opacity: 0.9;
    }
    /* 图片展示 */
    .image-section {
      padding: 12px 16px;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .image-item {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f5f5;
    }
    .image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      color: #999;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="feeding.html" class="back-btn">‹</a>
      <h1>投喂详情</h1>
    </div>
    
    <!-- 状态卡片 -->
    <div class="status-card">
      <div class="status-icon">✓</div>
      <div class="status-text">已完成</div>
      <div class="status-time">完成时间：2024-01-15 08:00:00</div>
    </div>
    
    <!-- 基本信息 -->
    <div class="detail-section">
      <div class="section-title">基本信息</div>
      <div class="detail-item">
        <span class="detail-label">投喂编号</span>
        <span class="detail-value">WF202401001</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">投喂日期</span>
        <span class="detail-value">2024-01-15</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">状态</span>
        <span class="detail-value"><span class="status-badge status-success">已完成</span></span>
      </div>
    </div>
    
    <!-- 投喂信息 -->
    <div class="detail-section">
      <div class="section-title">投喂信息</div>
      <div class="detail-item">
        <span class="detail-label">池塘</span>
        <span class="detail-value">1号池</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">投苗记录</span>
        <span class="detail-value">TM202401001 - 鳙鱼</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">饲料类型</span>
        <span class="detail-value">颗粒饲料</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">投喂数量</span>
        <span class="detail-value">50kg</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">投喂时间</span>
        <span class="detail-value">08:00</span>
      </div>
    </div>
    
    <!-- 现场图片 -->
    <div class="detail-section">
      <div class="section-title">现场图片</div>
      <div class="image-section">
        <div class="image-grid">
          <div class="image-item">
            <img src="https://picsum.photos/200/200?random=20" alt="投喂图片1">
          </div>
          <div class="image-item">
            <div class="image-placeholder">+</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 其他信息 -->
    <div class="detail-section">
      <div class="section-title">其他信息</div>
      <div class="detail-item">
        <span class="detail-label">操作人</span>
        <span class="detail-value">张三</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">备注</span>
        <span class="detail-value">上午投喂</span>
      </div>
    </div>
  </div>
  
  <!-- 底部操作栏 -->
  <div class="bottom-bar" id="bottomBar">
    <button class="btn btn-default" onclick="history.back()">返回</button>
  </div>

  <script>
    // 获取URL参数
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // 根据状态更新页面显示
    function updatePageByStatus() {
      const status = getUrlParam('status');
      const statusCard = document.querySelector('.status-card');
      const statusIcon = document.querySelector('.status-icon');
      const statusText = document.querySelector('.status-text');
      const statusTime = document.querySelector('.status-time');
      const statusBadge = document.querySelector('.status-badge');
      const bottomBar = document.getElementById('bottomBar');

      if (status === 'pending') {
        // 新建状态
        statusCard.classList.add('pending');
        statusIcon.textContent = '⏳';
        statusText.textContent = '新建';
        statusTime.textContent = '创建时间：2024-01-15 08:00:00';
        statusBadge.textContent = '新建';
        statusBadge.className = 'status-badge status-pending';
        
        // 新建状态显示编辑和取消按钮
        bottomBar.innerHTML = `
          <button class="btn btn-default" onclick="history.back()">取消</button>
          <a href="feeding-add.html?id=3" class="btn btn-primary">编辑</a>
        `;
      }
    }

    updatePageByStatus();
  </script>
</body>
</html>
