<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>销售出库</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/stock-out-form.css">
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="stock-in-select.html" class="back-btn">‹</a>
      <h1>销售出库</h1>
    </div>
    
    <!-- 表单 -->
    <div class="form-section">
      <div class="section-title">出库信息</div>
      <div class="form-group">
        <div class="form-item">
          <span class="form-label">出库基地</span>
          <input type="text" class="form-input" placeholder="请选择" value="千岛湖基地B区" readonly>
          <span class="form-arrow">›</span>
        </div>
        <div class="form-item">
          <span class="form-label">入库记录</span>
          <input type="text" class="form-input" placeholder="请选择" value="有机草鱼 - 1000kg" readonly>
          <span class="form-arrow">›</span>
        </div>
        <div class="form-item">
          <span class="form-label">出库数量</span>
          <input type="number" class="form-input" placeholder="请输入出库数量" value="500">
          <span class="form-unit">kg</span>
        </div>
        <div class="form-item">
          <span class="form-label">销售品牌</span>
          <input type="text" class="form-input" placeholder="请选择品牌">
          <span class="form-arrow">›</span>
        </div>
        <div class="form-item">
          <span class="form-label">关联表单</span>
          <input type="text" class="form-input" placeholder="请选择关联表单">
          <span class="form-arrow">›</span>
        </div>
      </div>
    </div>
    
    <div class="form-section">
      <div class="section-title">买家信息</div>
      <div class="form-group">
        <div class="form-item">
          <span class="form-label">买家名称</span>
          <input type="text" class="form-input" placeholder="请输入买家名称">
        </div>
        <div class="form-item">
          <span class="form-label">联系人</span>
          <input type="text" class="form-input" placeholder="请输入联系人姓名">
        </div>
        <div class="form-item">
          <span class="form-label">联系电话</span>
          <input type="tel" class="form-input" placeholder="请输入联系电话">
        </div>
        <div class="form-item">
          <span class="form-label">销售日期</span>
          <input type="date" class="form-input" value="2024-01-15">
        </div>
        <div class="form-item textarea-item">
          <span class="form-label">备注说明</span>
          <textarea class="form-textarea" placeholder="请输入备注信息（选填）"></textarea>
        </div>
      </div>
    </div>
    
    <!-- 提示信息 -->
    <div class="tips-box">
      <div class="tips-title">💡 温馨提示</div>
      <div class="tips-content">
        当前入库记录剩余库存：<strong>500kg</strong>，销售出库后将自动生成溯源码。
      </div>
    </div>
  </div>
  
  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <button class="btn btn-default" onclick="history.back()">取消</button>
    <button class="btn btn-primary" onclick="submitForm()">确认出库</button>
  </div>
  
  <script>
    function submitForm() {
      // 表单验证
      const buyer = document.querySelector('input[placeholder="请输入买家名称"]').value;
      const phone = document.querySelector('input[type="tel"]').value;
      const quantity = document.querySelector('input[type="number"]').value;
      
      if (!buyer) {
        alert('请输入买家名称');
        return;
      }
      if (!phone) {
        alert('请输入联系电话');
        return;
      }
      if (!quantity || quantity <= 0) {
        alert('请输入有效的出库数量');
        return;
      }
      alert('销售出库成功！');
      window.location.href = 'stock-out-list.html';
    }
  </script>
</body>
</html>
