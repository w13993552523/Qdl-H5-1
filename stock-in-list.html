<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>入库管理</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/stock-out-list.css">
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="index.html" class="back-btn">‹</a>
      <h1>入库管理</h1>
    </div>
    
    <!-- 入库记录列表 -->
    <div class="record-list">
      <a href="stock-in-detail.html?id=1" class="record-item">
        <div class="record-header">
          <span class="record-type">采购入库</span>
          <span class="record-status status-success">已入库</span>
        </div>
        <div class="record-body">
          <div class="record-info">
            <span class="record-label">入库基地：</span>
            <span class="record-value">千岛湖基地A区</span>
          </div>
          <div class="record-info">
            <span class="record-label">鱼种：</span>
            <span class="record-value">草鱼</span>
          </div>
          <div class="record-info">
            <span class="record-label">入库数量：</span>
            <span class="record-value">500尾</span>
          </div>
        </div>
        <div class="record-footer">
          <span class="record-time">2024-01-15 10:30</span>
          <span class="record-creator">创建人：李四</span>
        </div>
      </a>
      
      <a href="stock-in-detail.html?id=2" class="record-item">
        <div class="record-header">
          <span class="record-type type-transfer">生产转入</span>
          <span class="record-status status-success">已入库</span>
        </div>
        <div class="record-body">
          <div class="record-info">
            <span class="record-label">入库基地：</span>
            <span class="record-value">千岛湖基地B区</span>
          </div>
          <div class="record-info">
            <span class="record-label">鱼种：</span>
            <span class="record-value">鲤鱼</span>
          </div>
          <div class="record-info">
            <span class="record-label">入库数量：</span>
            <span class="record-value">300尾</span>
          </div>
        </div>
        <div class="record-footer">
          <span class="record-time">2024-01-14 14:20</span>
          <span class="record-creator">创建人：王五</span>
        </div>
      </a>
      
      <a href="stock-in-detail.html?id=3" class="record-item">
        <div class="record-header">
          <span class="record-type">采购入库</span>
          <span class="record-status status-success">已入库</span>
        </div>
        <div class="record-body">
          <div class="record-info">
            <span class="record-label">入库基地：</span>
            <span class="record-value">千岛湖基地A区</span>
          </div>
          <div class="record-info">
            <span class="record-label">鱼种：</span>
            <span class="record-value">鳙鱼</span>
          </div>
          <div class="record-info">
            <span class="record-label">入库数量：</span>
            <span class="record-value">200尾</span>
          </div>
        </div>
        <div class="record-footer">
          <span class="record-time">2024-01-13 09:15</span>
          <span class="record-creator">创建人：李四</span>
        </div>
      </a>
    </div>
  </div>
  
  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <a href="stock-in-type-select.html" class="btn btn-primary btn-block">新增入库</a>
  </div>
  
  <!-- 底部导航 -->
  <div class="tab-bar">
    <a href="index.html" class="tab-item active">
      <div class="tab-icon">📦</div>
      <div class="tab-text">仓储</div>
    </a>
    <a href="breeding/index.html" class="tab-item">
      <div class="tab-icon">🐟</div>
      <div class="tab-text">养殖</div>
    </a>
    <a href="profile.html" class="tab-item">
      <div class="tab-icon">👤</div>
      <div class="tab-text">我的</div>
    </a>
  </div>
</body>
</html>
