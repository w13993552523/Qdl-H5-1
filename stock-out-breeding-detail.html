<!DOCTYPE html>

<head>

      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">出库单号</span>
          <span class="detail-value">CY202401150001</span>

      <div class="section-header">
        <span class="section-icon">🐟</span>

      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">出库主体</span>
          <span class="detail-value highlight">草鱼</span>
        </div>
      </div>
    </div>

    <!-- 出库信息 -->
    <div class="detail-section">
      <div class="section-header">
        <span class="section-icon">📤</span>
        <span class="section-title">出库信息</span>
      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">出库时间</span>
          <span class="detail-value">2024-01-15 10:30</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">出库数量</span>
          <span class="detail-value highlight">200 尾</span>
        </div>
      </div>
    </div>

    <!-- 其他信息 -->
    <div class="detail-section">
      <div class="section-header">
        <span class="section-icon">⚙️</span>
        <span class="section-title">其他信息</span>
      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">操作人</span>
          <span class="detail-value">李四</span>

        <div class="detail-item">
          <span class="detail-label">备注说明</span>
          <span class="detail-value">日常投喂使用</span>

    <!-- 在线图片 -->

      <div class="section-header">

        <span class="section-title">在线图片</span>

      <div class="image-section">
        <div class="image-grid">
          <div class="image-item"><img src="https://picsum.photos/200/200?random=92" alt="出库图片"></div>
