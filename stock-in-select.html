<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>选择入库记录</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/stock-in-select.css">
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="stock-out-list.html" class="back-btn">‹</a>
      <h1>选择入库记录</h1>
    </div>
    
    <!-- 搜索栏 -->
    <div class="search-bar">
      <input type="text" class="search-input" placeholder="搜索基地名称、物品名称">
      <button class="search-btn">🔍</button>
    </div>
    
    <!-- 入库记录列表 -->
    <div class="select-list">
      <label class="select-item">
        <input type="radio" name="stockIn" value="1" class="select-radio">
        <div class="select-content">
          <div class="select-header">
            <span class="select-title">千岛湖基地A区</span>
            <span class="select-tag">饲料</span>
          </div>
          <div class="select-info">
            <span>草鱼饲料 - 500kg</span>
          </div>
          <div class="select-meta">
            <span>入库时间：2024-01-10</span>
            <span>剩余：350kg</span>
          </div>
        </div>
      </label>
      
      <label class="select-item">
        <input type="radio" name="stockIn" value="2" class="select-radio">
        <div class="select-content">
          <div class="select-header">
            <span class="select-title">千岛湖基地B区</span>
            <span class="select-tag tag-medicine">药品</span>
          </div>
          <div class="select-info">
            <span>鱼药-消毒剂 - 50L</span>
          </div>
          <div class="select-meta">
            <span>入库时间：2024-01-08</span>
            <span>剩余：35L</span>
          </div>
        </div>
      </label>
      
      <label class="select-item">
        <input type="radio" name="stockIn" value="3" class="select-radio">
        <div class="select-content">
          <div class="select-header">
            <span class="select-title">千岛湖基地A区</span>
            <span class="select-tag">饲料</span>
          </div>
          <div class="select-info">
            <span>鲤鱼饲料 - 1000kg</span>
          </div>
          <div class="select-meta">
            <span>入库时间：2024-01-05</span>
            <span>剩余：800kg</span>
          </div>
        </div>
      </label>
      
      <label class="select-item">
        <input type="radio" name="stockIn" value="4" class="select-radio">
        <div class="select-content">
          <div class="select-header">
            <span class="select-title">千岛湖基地C区</span>
            <span class="select-tag tag-medicine">药品</span>
          </div>
          <div class="select-info">
            <span>鱼药-抗生素 - 20kg</span>
          </div>
          <div class="select-meta">
            <span>入库时间：2024-01-03</span>
            <span>剩余：15kg</span>
          </div>
        </div>
      </label>
    </div>
  </div>
  
  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <button class="btn btn-default" onclick="history.back()">取消</button>
    <button class="btn btn-primary" onclick="goToForm()">下一步</button>
  </div>
  
  <script>
    function goToForm() {
      const selected = document.querySelector('input[name="stockIn"]:checked');
      if (!selected) {
        alert('请选择一条入库记录');
        return;
      }
      // 根据选择跳转到对应表单
      window.location.href = 'stock-out-breeding.html';
    }
  </script>
</body>
</html>
