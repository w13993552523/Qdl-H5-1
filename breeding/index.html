<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>养殖管理</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .container {
      min-height: 100vh;
      background: #f5f5f5;
      padding-bottom: 120px;
    }

    /* 页面标题 - 统一高度 44px */
    .page-header {
      background: linear-gradient(135deg, #1890ff 0%, #36cfc9 100%);
      padding: 0 16px;
      height: 44px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .page-title {
      font-size: 17px;
      font-weight: 600;
    }

    /* 功能菜单列表 */
    .menu-list {
      background: #fff;
      margin: 12px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 18px 16px;
      border-bottom: 1px solid #f0f0f0;
      text-decoration: none;
      color: inherit;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:active {
      background: #f5f5f5;
    }

    .menu-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-right: 16px;
    }

    .seedling-icon { background: #e6f7ff; }
    .process-icon { background: #f0f5ff; }
    .feeding-icon { background: #f6ffed; }
    .medication-icon { background: #fff2f0; }
    .transfer-icon { background: #fff7e6; }
    .fishing-icon { background: #f9f0ff; }

    .menu-content {
      flex: 1;
    }

    .menu-title {
      font-size: 17px;
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }

    .menu-desc {
      font-size: 13px;
      color: #999;
    }

    .menu-arrow {
      font-size: 20px;
      color: #ccc;
    }

    /* 统计区域 */
    .stats-section {
      background: #fff;
      margin: 12px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
    }

    .stats-grid {
      display: flex;
      justify-content: space-between;
    }

    .stat-card {
      flex: 1;
      text-align: center;
      padding: 16px 8px;
      background: #f8f9fa;
      border-radius: 10px;
      margin: 0 6px;
    }

    .stat-card:first-child { margin-left: 0; }
    .stat-card:last-child { margin-right: 0; }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #1890ff;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
    }

    /* 底部导航 */
    .tab-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      background: #fff;
      border-top: 1px solid #f0f0f0;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      text-decoration: none;
      color: #999;
    }

    .tab-item.active {
      color: #1890ff;
    }

    .tab-icon {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .tab-text {
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <div class="page-title">养殖管理</div>
    </div>

    <!-- 功能菜单列表 -->
    <div class="menu-list">
      <a href="seedling.html" class="menu-item">
        <div class="menu-icon seedling-icon">🐟</div>
        <div class="menu-content">
          <div class="menu-title">投苗管理</div>
          <div class="menu-desc">记录鱼苗投放信息</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="feeding.html" class="menu-item">
        <div class="menu-icon feeding-icon">🍽️</div>
        <div class="menu-content">
          <div class="menu-title">投喂管理</div>
          <div class="menu-desc">记录每日投喂情况</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="medication.html" class="menu-item">
        <div class="menu-icon medication-icon">💊</div>
        <div class="menu-content">
          <div class="menu-title">投药管理</div>
          <div class="menu-desc">记录用药信息与休药期</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="transfer.html" class="menu-item">
        <div class="menu-icon transfer-icon">🔄</div>
        <div class="menu-content">
          <div class="menu-title">移池管理</div>
          <div class="menu-desc">记录鱼群移池操作</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="fishing.html" class="menu-item">
        <div class="menu-icon fishing-icon">🎣</div>
        <div class="menu-content">
          <div class="menu-title">捕捞管理</div>
          <div class="menu-desc">记录捕捞与销售信息</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="tab-bar">
    <a href="../index.html" class="tab-item">
      <div class="tab-icon">📦</div>
      <div class="tab-text">仓储</div>
    </a>
    <a href="index.html" class="tab-item active">
      <div class="tab-icon">🐟</div>
      <div class="tab-text">养殖</div>
    </a>
    <a href="../profile.html" class="tab-item">
      <div class="tab-icon">👤</div>
      <div class="tab-text">我的</div>
    </a>
  </div>

  <script>
    // 加载统计数据
    function loadStats() {
      const stats = JSON.parse(localStorage.getItem('breedingStats') || '{}');
      if (stats.pondCount) {
        document.getElementById('pondCount').textContent = stats.pondCount;
      }
      if (stats.totalFish) {
        document.getElementById('totalFish').textContent = stats.totalFish.toLocaleString();
      }
      if (stats.avgDays) {
        document.getElementById('avgDays').textContent = stats.avgDays;
      }
    }

    loadStats();
  </script>
</body>
</html>
