<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>新增投苗</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .page-header {
      background: #1890ff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: -16px -16px 16px -16px;
      padding: 16px;
    }
    .back-btn {
      position: absolute;
      left: 16px;
      color: #fff;
      font-size: 28px;
      text-decoration: none;
    }
    .page-header h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }
    .form-section {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-title {
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }
    .form-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f5f5f5;
    }
    .form-item:last-child {
      border-bottom: none;
    }
    .form-label {
      width: 100px;
      font-size: 15px;
      color: #333;
    }
    .form-label .required {
      color: #ff4d4f;
    }
    .form-input, .form-select {
      flex: 1;
      border: none;
      text-align: right;
      font-size: 15px;
      color: #333;
      outline: none;
      background: transparent;
    }
    .form-input::placeholder {
      color: #bbb;
    }
    .form-arrow {
      color: #ccc;
      margin-left: 8px;
    }
    .pond-row {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      align-items: center;
    }
    .pond-row select {
      flex: 1;
      height: 36px;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 0 8px;
    }
    .pond-row input {
      width: 80px;
      height: 36px;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 0 8px;
      text-align: center;
    }
    .add-pond-btn {
      margin: 8px 16px 16px;
      width: calc(100% - 32px);
      height: 36px;
      background: #f6ffed;
      border: 1px dashed #52c41a;
      border-radius: 4px;
      color: #52c41a;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="seedling.html" class="back-btn">‹</a>
      <h1>新增投苗</h1>
    </div>
    
    <!-- 基本信息 -->
    <div class="form-section">
      <div class="section-title">基本信息</div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 投苗日期</span>
        <input type="date" class="form-input" id="seedlingDate">
      </div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 基地</span>
        <select class="form-select">
          <option>千岛湖基地A</option>
          <option>千岛湖基地B</option>
        </select>
        <span class="form-arrow">›</span>
      </div>
    </div>
    
    <!-- 投放信息 -->
    <div class="form-section">
      <div class="section-title">投放信息</div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 鱼种</span>
        <select class="form-select">
          <option>请选择鱼种</option>
          <option>鳙鱼</option>
          <option>鲢鱼</option>
          <option>草鱼</option>
          <option>鲫鱼</option>
          <option>鲤鱼</option>
        </select>
        <span class="form-arrow">›</span>
      </div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 鱼苗规格</span>
        <select class="form-select">
          <option>请选择规格</option>
          <option>5-8cm</option>
          <option>6-10cm</option>
          <option>8-12cm</option>
          <option>10-15cm</option>
        </select>
        <span class="form-arrow">›</span>
      </div>
      <div class="section-title">投放池塘及数量</div>
      <div class="pond-row">
        <select>
          <option>选择池塘</option>
          <option>1号池</option>
          <option>2号池</option>
          <option>3号池</option>
          <option>4号池</option>
        </select>
        <input type="number" placeholder="数量">
        <span>尾</span>
      </div>
      <button class="add-pond-btn">+ 添加池塘</button>
    </div>
    
    <!-- 其他信息 -->
    <div class="form-section">
      <div class="section-title">其他信息</div>
      <div class="form-item">
        <span class="form-label">关联入库单</span>
        <select class="form-select">
          <option>请选择入库单</option>
          <option>RK202401001</option>
          <option>RK202401002</option>
        </select>
        <span class="form-arrow">›</span>
      </div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 操作人</span>
        <input type="text" class="form-input" placeholder="请输入操作人">
      </div>
      <div class="form-item">
        <span class="form-label">备注</span>
        <input type="text" class="form-input" placeholder="请输入备注">
      </div>
    </div>
  </div>
  
  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <button class="btn btn-default" onclick="history.back()">取消</button>
    <button class="btn btn-primary">保存</button>
  </div>

  <script>
    document.getElementById('seedlingDate').value = new Date().toISOString().split('T')[0];
  </script>
</body>
</html>
