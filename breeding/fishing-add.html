<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>新增捕捞</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .page-header {
      background: #722ed1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: -16px -16px 16px -16px;
      padding: 16px;
    }
    .back-btn {
      position: absolute;
      left: 16px;
      color: #fff;
      font-size: 28px;
      text-decoration: none;
    }
    .page-header h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }
    .form-section {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-title {
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }
    .form-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f5f5f5;
    }
    .form-item:last-child {
      border-bottom: none;
    }
    .form-label {
      width: 100px;
      font-size: 15px;
      color: #333;
    }
    .form-label .required {
      color: #ff4d4f;
    }
    .form-input, .form-select {
      flex: 1;
      border: none;
      text-align: right;
      font-size: 15px;
      color: #333;
      outline: none;
      background: transparent;
    }
    .form-input::placeholder {
      color: #bbb;
    }
    .form-arrow {
      color: #ccc;
      margin-left: 8px;
    }
    .fishing-row {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      align-items: center;
    }
    .fishing-row select {
      flex: 1;
      height: 36px;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 0 8px;
    }
    .fishing-row input {
      width: 80px;
      height: 36px;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 0 8px;
      text-align: center;
    }
    .add-fishing-btn {
      margin: 8px 16px 16px;
      width: calc(100% - 32px);
      height: 36px;
      background: #f9f0ff;
      border: 1px dashed #722ed1;
      border-radius: 4px;
      color: #722ed1;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <a href="fishing.html" class="back-btn">‹</a>
      <h1>新增捕捞</h1>
    </div>
    
    <!-- 基本信息 -->
    <div class="form-section">
      <div class="section-title">基本信息</div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 选择投苗</span>
        <select class="form-select">
          <option>请选择投苗记录</option>
          <option>TM202401001 - 1号池 - 鳙鱼</option>
          <option>TM202401002 - 2号池 - 鲢鱼</option>
          <option>TM202401003 - 3号池 - 草鱼</option>
        </select>
        <span class="form-arrow">›</span>
      </div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 捕捞日期</span>
        <input type="date" class="form-input" id="fishingDate">
      </div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 捕捞时间</span>
        <input type="time" class="form-input" id="fishingTime">
      </div>
    </div>
    
    <!-- 捕捞明细 -->
    <div class="form-section">
      <div class="section-title">捕捞明细</div>
      <div class="fishing-row">
        <select>
          <option>选择池塘</option>
          <option>1号池</option>
          <option>2号池</option>
          <option>3号池</option>
        </select>
        <input type="number" placeholder="数量">
        <span>kg</span>
      </div>
      <button class="add-fishing-btn">+ 添加捕捞明细</button>
    </div>
    
    <!-- 目的地 -->
    <div class="form-section">
      <div class="section-title">目的地</div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 去向</span>
        <select class="form-select">
          <option>请选择目的地</option>
          <option>A1冷库</option>
          <option>A2冷库</option>
          <option>B1冷库</option>
          <option>直接销售</option>
        </select>
        <span class="form-arrow">›</span>
      </div>
    </div>
    
    <!-- 其他信息 -->
    <div class="form-section">
      <div class="section-title">其他信息</div>
      <div class="form-item">
        <span class="form-label"><span class="required">*</span> 操作人</span>
        <input type="text" class="form-input" placeholder="请输入操作人">
      </div>
      <div class="form-item">
        <span class="form-label">备注</span>
        <input type="text" class="form-input" placeholder="请输入备注">
      </div>
    </div>
  </div>
  
  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <button class="btn btn-default" onclick="history.back()">取消</button>
    <button class="btn btn-primary">保存</button>
  </div>

  <script>
    const now = new Date();
    document.getElementById('fishingDate').value = now.toISOString().split('T')[0];
    document.getElementById('fishingTime').value = now.toTimeString().slice(0,5);
  </script>
</body>
</html>
